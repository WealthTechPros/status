  # Adviser MCP sits behind a Cloudflare Access gate: curl gets 403, a browser
  # gets 302 to the CF login. Without expectedStatusCodes Upptime would read
  # it as permanently down. Swap to an unauthenticated /health path if one
  # is ever exposed.
  - name: Adviser MCP
    url: https://adviser-mcp.wealthtechpros.com
    expectedStatusCodes:
      - 200
      - 302
      - 403
  # demo.clientonboarding.wealthtechpros.com deliberately NOT monitored —
  # live but a demo env that may be parked between sessions; monitoring it
  # would open false-alarm incidents (decision 2026-07-02, Rob to revisit).
  # www / benchmark.wealthtechpros.com / staging.sgd. skipped — same origins
  # as already-monitored services (no extra signal).
  # Platform Automation Proxy — OFF. proxy.wealthtechpros.com does not resolve
  # yet (NXDOMAIN — the proxy is not deployed at that hostname).
  # The monitor was removed in #4; its auto-opened downtime incident (#1) was a
  # FALSE ALARM (placeholder host, never deployed) and has been closed manually
  # — Upptime cannot auto-close it once the monitor is gone (wtp-org #53).
  # re-enable when proxy.wealthtechpros.com is live (not yet deployed, 2026-06-24)
  # - name: Platform Automation Proxy
  #   url: https://proxy.wealthtechpros.com
  # SFTP — intentionally OFF. The Azure SFTP feature costs ~£160/mo just to be
  # enabled, so it goes up ONLY for a paying client (decision 2026-06-20).
  # Re-add this monitor when wtp-sftp is live with enable_sftp=true:
  # - name: SFTP
  #   url: tcp://FILL_IN_SFTP_HOSTNAME:22

