# WTP-owned replacement for the stock Graphs CI, which has silently produced
# nothing since repo setup: `npx @upptime/graphs` depends (via
# chartjs-node-canvas@3) on canvas@2.x, which has no prebuilt binaries for
# Node 22+ — on current runners the source build fails and the CLI dies
# without output, so graphs/<slug>/ and api/<slug>/ were never generated
# (only template leftovers from the initial commit exist).
#
# Fix: pin Node 20 (last ABI with canvas@2 prebuilts) before running the
# generator. This file is intentionally NOT part of the Upptime template set
# (.templaterc.json syncs .github/**/* by overwriting matching template
# files; extra files like this one survive). The stock graphs.yml is left in
# place — it remains a harmless no-op.
#
# Remove this workflow if upstream fixes upptime/graphs#? (see
# upptime/upptime — their own graphs stopped updating 2026-05-20).

name: WTP Graphs CI
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upptime
  cancel-in-progress: false
jobs:
  graphs:
    name: Generate graphs (Node 20)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Use Node 20 (canvas@2 prebuilt ABI)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate graphs
        run: npx -y @upptime/graphs
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Show what was generated
        run: |
          ls -R graphs | head -50
          ls -R api | head -50
      - name: Commit and push
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add graphs api
          git diff --staged --quiet && echo "No graph changes" || {
            git commit -m ":bento: Update graphs [skip ci] [upptime]"
            git push
          }
